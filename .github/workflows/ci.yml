name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-build:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-sdk/target
            example-mod/target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Check formatting (rust-sdk)
        run: cargo fmt --all -- --check
        working-directory: rust-sdk

      - name: Check formatting (example-mod)
        run: cargo fmt --all -- --check
        working-directory: example-mod

      - name: Clippy (rust-sdk)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust-sdk

      - name: Clippy (example-mod)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: example-mod

      - name: Build rustcraft-core
        run: cargo build --release -p rustcraft-core
        working-directory: rust-sdk

      - name: Build rustcraft-api
        run: cargo build --release -p rustcraft-api
        working-directory: rust-sdk

      - name: Build example-mod
        run: cargo build --release
        working-directory: example-mod

      - name: Run Rust tests
        run: cargo test --all
        working-directory: rust-sdk

      - name: Run example-mod tests
        run: cargo test
        working-directory: example-mod

      - name: Upload core library
        uses: actions/upload-artifact@v4
        with:
          name: rustcraft-core-linux-x64
          path: rust-sdk/target/release/librustcraft_core.so
          retention-days: 7

      - name: Upload example-mod library
        uses: actions/upload-artifact@v4
        with:
          name: rustcraft-example-linux-x64
          path: example-mod/target/release/librustcraft_example.so
          retention-days: 7

  java-build:
    name: Java Build
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download core library
        uses: actions/download-artifact@v4
        with:
          name: rustcraft-core-linux-x64
          path: rust-sdk/target/release/

      - name: Download example-mod library
        uses: actions/download-artifact@v4
        with:
          name: rustcraft-example-linux-x64
          path: example-mod/target/release/

      - name: Build fabric-loader
        run: ./gradlew build
        working-directory: fabric-loader

      - name: Build example-mod wrapper
        run: ./gradlew build
        working-directory: example-mod/wrapper

      - name: Upload loader JAR
        uses: actions/upload-artifact@v4
        with:
          name: rustcraft-loader
          path: fabric-loader/build/libs/*.jar
          retention-days: 7

      - name: Upload example wrapper JAR
        uses: actions/upload-artifact@v4
        with:
          name: rustcraft-example-wrapper
          path: example-mod/wrapper/build/libs/*.jar
          retention-days: 7
